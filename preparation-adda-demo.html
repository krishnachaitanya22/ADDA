  });
  setTimeout(function () {
    var root = document.getElementById('root');
    if (root && root.textContent.indexOf('Loading demo') !== -1) {
      var box = document.getElementById('fatal-error');
      var msg = document.getElementById('fatal-error-message');
      if (box && msg && box.style.display !== 'block') {
        box.style.display = 'block';
        msg.textContent = 'The app never finished loading. This usually means React could not be downloaded from unpkg.com — check your internet connection or any blocking extension.';

</script>
